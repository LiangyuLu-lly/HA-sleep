name: Test & Validate

# Why this workflow exists
# ------------------------
# Three real failure modes the project has hit during development, each of
# which now blocks the PR/merge here:
#
#   1. Forgotten ``prepare.sh`` run leaves rootfs/ stale, so the add-on
#      builds against the *previous* version of src/.  See "rootfs sync"
#      job below — it re-runs prepare in a clean clone and fails if any
#      diff appears.
#   2. ``pytest.mark.asyncio`` was silently broken for months because
#      pytest-asyncio wasn't a dev-dep.  Pinned in requirements-train.txt
#      now and the unit-tests job below installs it.
#   3. ``config.yaml`` schema typos surface only when HA Supervisor tries
#      to load the add-on on a real Pi.  We run the official
#      home-assistant/actions/helpers add-on linter to catch them at PR
#      time instead.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------- #
  # Unit + integration tests on the matrix of Python versions we support.
  # -------------------------------------------------------------------- #
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            requirements-runtime.txt
            requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Version consistency check
        run: python scripts/sync_version.py --check

      - name: Branding asset check
        run: python scripts/check_branding.py

      - name: Translations coverage check
        run: python scripts/check_translations.py

      - name: Medical links check
        run: python scripts/check_medical_links.py

      - name: Funding consistency check
        run: python scripts/check_funding.py

      - name: Run pytest
        run: pytest tests/ -m "not slow" --timeout=60 --cov=src --cov=scripts --cov-fail-under=92 -q

  # -------------------------------------------------------------------- #
  # v3.0.0 algorithmic-moat：``slow`` 矩阵分支。
  # BAO/CAE/EMST 引入的训练管线 + property-based 端到端测试本质上慢
  # （bootstrap 1000 次、长时段 SIGTERM drain、ONNX 推理 latency 抽样
  # 等），不能塞进默认 60 秒超时。这里独立成 job，pytest 只跑 ``slow``
  # 标记的用例，超时放大到 600 秒。
  # -------------------------------------------------------------------- #
  slow-tests:
    name: Slow tests (pytest -m slow)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements-runtime.txt
            requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run slow pytest suite
        run: |
          # Exit code 5 = "no tests collected" — tolerated until v3.0.0 PBT
          # tests (P19 / P20) land with the ``slow`` marker.
          set +e
          pytest tests/ -m "slow" --timeout=600 -q
          rc=$?
          if [ "$rc" -eq 5 ]; then
            echo "::notice::No tests matched -m 'slow' yet; skipping."
            exit 0
          fi
          exit "$rc"

  # -------------------------------------------------------------------- #
  # Catches the #1 gotcha: forgetting to mirror src/ → addons/.../rootfs/
  # before pushing.  The HA Supervisor would happily build a stale image.
  # -------------------------------------------------------------------- #
  rootfs-sync:
    name: rootfs/ is in sync with src/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run prepare.sh and check for unstaged changes
        run: |
          chmod +x sleep_classifier/prepare.sh
          sleep_classifier/prepare.sh
          if ! git diff --quiet -- sleep_classifier/rootfs; then
            echo "::error::rootfs/ is out of sync with the project sources."
            echo "Run sleep_classifier/prepare.sh locally before pushing."
            git --no-pager diff --stat -- sleep_classifier/rootfs
            exit 1
          fi

  # -------------------------------------------------------------------- #
  # Add-on metadata validation.  The Supervisor schema lives in the
  # frenck/action-addon-linter image and parses config.yaml exactly the
  # way HA does at install time.
  # -------------------------------------------------------------------- #
  addon-lint:
    name: Add-on schema lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate config.yaml
        uses: frenck/action-addon-linter@v2
        with:
          path: ./sleep_classifier

  # -------------------------------------------------------------------- #
  # Optional: shellcheck on run.sh / prepare.sh.  Catches ``set -e``
  # bypasses and unquoted variable expansions before they bite on a Pi.
  # -------------------------------------------------------------------- #
  shellcheck:
    name: shellcheck (run.sh, prepare.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./sleep_classifier
          severity: warning

  # -------------------------------------------------------------------- #
  # Markdown link checking (README, DOCS, docs/*.md).
  # -------------------------------------------------------------------- #
  link-check:
    name: Markdown link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            README.md
            INSTALL.md
            sleep_classifier/DOCS.md
            docs/*.md
            --no-progress
          fail: true

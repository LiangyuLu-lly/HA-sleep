name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Sync version
        run: |
          python scripts/sync_version.py
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: sync version"
            git push origin HEAD:main
          fi

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract CHANGELOG section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BODY=$(sed -n '/^## \['"$VERSION"'\]/,/^## \[/p' CHANGELOG.md | sed '$d')
          if [ -z "$BODY" ]; then
            echo "::error::No CHANGELOG entry found for version $VERSION"
            exit 1
          fi
          # Write to file for multi-line output
          echo "$BODY" > /tmp/release_body.md
          echo "body_path=/tmp/release_body.md" >> "$GITHUB_OUTPUT"

      - name: Package sleep_classifier directory
        run: |
          zip -r sleep_classifier.zip sleep_classifier/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.changelog.outputs.body_path }}
          files: sleep_classifier.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

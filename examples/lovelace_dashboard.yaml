# Sleep Classifier — 完整 Lovelace 仪表板（v2.0.0）
#
# 使用方法：Settings → Dashboards → New Dashboard →
# ⋮ Raw configuration editor → 粘贴此文件全部内容。
#
# 覆盖全部 20 个 sensor.sleep_classifier_* 实体，分为 4 个视图：
#   View 1 "今晚"：stage + confidence + quality + duration + last_action + health
#   View 2 "学习"：learned_bedtime_workday/weekend + learned_environment +
#                   recommendation_explain + per_stage_deltas
#   View 3 "健康"：debt_hours + recommended_bedtime + wake_decision +
#                   soundscape + apnea_index
#   View 4 "质量细分"：quality_architecture + quality_efficiency +
#                       quality_fragmentation + quality_onset + history-graph

title: Sleep Classifier
views:
  # ===================================================================
  # View 1 — 今晚（实时一览）
  # ===================================================================
  - title: 今晚
    path: tonight
    icon: mdi:bed
    cards:
      - type: vertical-stack
        cards:
          - type: glance
            title: 实时状态
            columns: 4
            entities:
              - entity: sensor.sleep_classifier_stage
                name: 阶段
              - entity: sensor.sleep_classifier_confidence
                name: 置信度
              - entity: sensor.sleep_classifier_quality_score
                name: 质量分
              - entity: sensor.sleep_classifier_session_duration
                name: 时长
          - type: gauge
            entity: sensor.sleep_classifier_quality_score
            name: 今晚质量
            min: 0
            max: 100
            severity:
              green: 75
              yellow: 50
              red: 0
          - type: entities
            title: 最近操作
            entities:
              - entity: sensor.sleep_classifier_last_action
                name: 最近一次控制
              - type: attribute
                entity: sensor.sleep_classifier_last_action
                attribute: executed
                name: 已执行？
              - type: attribute
                entity: sensor.sleep_classifier_last_action
                attribute: at
                name: 时间
              - type: attribute
                entity: sensor.sleep_classifier_last_action
                attribute: skipped_by_capability
                name: 能力跳过
              - type: attribute
                entity: sensor.sleep_classifier_last_action
                attribute: skipped_unavailable
                name: 不可用跳过
              - type: attribute
                entity: sensor.sleep_classifier_last_action
                attribute: skipped_user_override
                name: 用户覆盖跳过
          - type: entities
            title: 系统健康
            entities:
              - entity: sensor.sleep_classifier_health
                name: 聚合状态
              - type: attribute
                entity: sensor.sleep_classifier_health
                attribute: stage_source_stale
                name: 阶段源 stale
              - type: attribute
                entity: sensor.sleep_classifier_health
                attribute: env_stale_fields
                name: 环境 stale 字段
              - type: attribute
                entity: sensor.sleep_classifier_health
                attribute: publisher_failures
                name: 发布失败次数
              - type: attribute
                entity: sensor.sleep_classifier_health
                attribute: learner_sessions
                name: 学习器 session 数

      - type: history-graph
        title: 今晚阶段轨迹
        hours_to_show: 12
        entities:
          - entity: sensor.sleep_classifier_stage

  # ===================================================================
  # View 2 — 学习（偏好学习面板）
  # ===================================================================
  - title: 学习
    path: learned
    icon: mdi:brain
    cards:
      - type: vertical-stack
        cards:
          - type: glance
            title: 入睡时间预测
            columns: 3
            entities:
              - entity: sensor.sleep_classifier_recommended_bedtime
                name: 今晚推荐
              - entity: sensor.sleep_classifier_learned_bedtime_workday
                name: 工作日
              - entity: sensor.sleep_classifier_learned_bedtime_weekend
                name: 周末
          - type: entities
            title: 最佳环境（k-NN）
            entities:
              - entity: sensor.sleep_classifier_learned_environment
                name: 今晚推荐
              - type: attribute
                entity: sensor.sleep_classifier_learned_environment
                attribute: temperature_c
                name: 温度
                suffix: " °C"
              - type: attribute
                entity: sensor.sleep_classifier_learned_environment
                attribute: humidity_pct
                name: 湿度
                suffix: " %"
              - type: attribute
                entity: sensor.sleep_classifier_learned_environment
                attribute: brightness_pct
                name: 亮度
                suffix: " %"
              - type: attribute
                entity: sensor.sleep_classifier_learned_environment
                attribute: confidence
                name: 置信度
              - type: attribute
                entity: sensor.sleep_classifier_learned_environment
                attribute: n_used
                name: 使用 session 数
          - type: entities
            title: 推荐理由
            entities:
              - entity: sensor.sleep_classifier_recommendation_explain
                name: 状态
              - type: attribute
                entity: sensor.sleep_classifier_recommendation_explain
                attribute: method
                name: 算法
              - type: attribute
                entity: sensor.sleep_classifier_recommendation_explain
                attribute: n_total
                name: 总 session 数
              - type: attribute
                entity: sensor.sleep_classifier_recommendation_explain
                attribute: avg_age_days
                name: 平均年龄（天）
              - type: attribute
                entity: sensor.sleep_classifier_recommendation_explain
                attribute: effective_sample_size
                name: 有效样本量 ESS

      - type: entities
        title: 各阶段学习偏移（v1.5.0）
        entities:
          - entity: sensor.sleep_classifier_per_stage_deltas
            name: 状态
            secondary_info: last-changed
          - type: section
            label: 温度偏移 vs. LIGHT
          - type: attribute
            entity: sensor.sleep_classifier_per_stage_deltas
            attribute: awake_temperature_c_delta
            name: AWAKE Δ
            suffix: " °C"
          - type: attribute
            entity: sensor.sleep_classifier_per_stage_deltas
            attribute: deep_temperature_c_delta
            name: DEEP Δ
            suffix: " °C"
          - type: attribute
            entity: sensor.sleep_classifier_per_stage_deltas
            attribute: rem_temperature_c_delta
            name: REM Δ
            suffix: " °C"
          - type: section
            label: 有效样本量（≥ 阈值 = personalised）
          - type: attribute
            entity: sensor.sleep_classifier_per_stage_deltas
            attribute: ess_threshold
            name: 阈值
          - type: attribute
            entity: sensor.sleep_classifier_per_stage_deltas
            attribute: awake_ess
            name: AWAKE ESS
          - type: attribute
            entity: sensor.sleep_classifier_per_stage_deltas
            attribute: deep_ess
            name: DEEP ESS
          - type: attribute
            entity: sensor.sleep_classifier_per_stage_deltas
            attribute: rem_ess
            name: REM ESS

  # ===================================================================
  # View 3 — 健康（睡眠债 + 唤醒 + 音景 + 呼吸）
  # ===================================================================
  - title: 健康
    path: health
    icon: mdi:heart-pulse
    cards:
      - type: vertical-stack
        cards:
          - type: gauge
            entity: sensor.sleep_classifier_debt_hours
            name: 睡眠债
            min: 0
            max: 12
            severity:
              green: 0
              yellow: 4
              red: 8
            unit: " h"
          - type: entities
            title: 恢复计划
            entities:
              - entity: sensor.sleep_classifier_debt_hours
                name: 当前睡眠债
              - type: attribute
                entity: sensor.sleep_classifier_debt_hours
                attribute: recovery_extra_minutes
                name: 今晚需多睡
                suffix: " min"
              - type: attribute
                entity: sensor.sleep_classifier_debt_hours
                attribute: recovery_target_bedtime
                name: 目标入睡时间
              - type: attribute
                entity: sensor.sleep_classifier_debt_hours
                attribute: recovery_horizon_nights
                name: 恢复周期
                suffix: " 晚"
          - type: entities
            title: 推荐入睡时间
            entities:
              - entity: sensor.sleep_classifier_recommended_bedtime
                name: 今晚推荐
              - type: attribute
                entity: sensor.sleep_classifier_recommended_bedtime
                attribute: bucket
                name: 分桶
              - type: attribute
                entity: sensor.sleep_classifier_recommended_bedtime
                attribute: n_sessions
                name: 依据 session 数
          - type: entities
            title: 智能唤醒
            entities:
              - entity: sensor.sleep_classifier_wake_decision
                name: 决策
              - type: attribute
                entity: sensor.sleep_classifier_wake_decision
                attribute: alarm_time
                name: 闹钟时间
              - type: attribute
                entity: sensor.sleep_classifier_wake_decision
                attribute: light_ramp_start
                name: 灯光渐亮开始
              - type: attribute
                entity: sensor.sleep_classifier_wake_decision
                attribute: matched_stage
                name: 匹配阶段
          - type: entities
            title: 音景
            entities:
              - entity: sensor.sleep_classifier_soundscape
                name: 当前音景
              - type: attribute
                entity: sensor.sleep_classifier_soundscape
                attribute: volume_pct
                name: 音量
                suffix: " %"
              - type: attribute
                entity: sensor.sleep_classifier_soundscape
                attribute: reason
                name: 选择原因
          - type: entities
            title: 呼吸暂停趋势
            entities:
              - entity: sensor.sleep_classifier_apnea_index
                name: 趋势
              - type: attribute
                entity: sensor.sleep_classifier_apnea_index
                attribute: status
                name: 状态
              - type: attribute
                entity: sensor.sleep_classifier_apnea_index
                attribute: disclaimer
                name: 免责声明

  # ===================================================================
  # View 4 — 质量细分（子分 + 长期趋势）
  # ===================================================================
  - title: 质量细分
    path: quality
    icon: mdi:chart-line
    cards:
      - type: vertical-stack
        cards:
          - type: glance
            title: 质量子分（0-100）
            columns: 4
            entities:
              - entity: sensor.sleep_classifier_quality_architecture
                name: 结构
              - entity: sensor.sleep_classifier_quality_efficiency
                name: 效率
              - entity: sensor.sleep_classifier_quality_fragmentation
                name: 碎片化
              - entity: sensor.sleep_classifier_quality_onset
                name: 入睡速度
          - type: gauge
            entity: sensor.sleep_classifier_quality_architecture
            name: 睡眠结构分
            min: 0
            max: 100
            severity:
              green: 75
              yellow: 50
              red: 0
          - type: gauge
            entity: sensor.sleep_classifier_quality_efficiency
            name: 睡眠效率分
            min: 0
            max: 100
            severity:
              green: 85
              yellow: 70
              red: 0
          - type: gauge
            entity: sensor.sleep_classifier_quality_fragmentation
            name: 碎片化分（越高越好）
            min: 0
            max: 100
            severity:
              green: 75
              yellow: 50
              red: 0
          - type: gauge
            entity: sensor.sleep_classifier_quality_onset
            name: 入睡速度分
            min: 0
            max: 100
            severity:
              green: 75
              yellow: 50
              red: 0

      - type: history-graph
        title: 质量分趋势（30 天）
        hours_to_show: 720
        entities:
          - entity: sensor.sleep_classifier_quality_score
          - entity: sensor.sleep_classifier_quality_architecture
          - entity: sensor.sleep_classifier_quality_efficiency
          - entity: sensor.sleep_classifier_quality_fragmentation
          - entity: sensor.sleep_classifier_quality_onset

      - type: history-graph
        title: 睡眠债趋势（30 天）
        hours_to_show: 720
        entities:
          - entity: sensor.sleep_classifier_debt_hours

      - type: statistics-graph
        title: 置信度趋势（7 天）
        chart_type: line
        period: hour
        days_to_show: 7
        stat_types:
          - mean
          - min
          - max
        entities:
          - sensor.sleep_classifier_confidence

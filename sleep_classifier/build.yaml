# Explicit base image per architecture.
#
# Why this file exists
# --------------------
# Modern HA Supervisor (>= 2024.x) refuses to substitute `${BUILD_FROM}`
# in the Dockerfile's `FROM` line unless an add-on ships a build.yaml
# (or build.json) telling it which base image to use for each arch.
# Without this file the build fails with:
#     base name (${BUILD_FROM}) should not be blank
#
# We deliberately pick the Alpine-flavoured HA base images:
#   * smaller layer count → faster pull on Pi 4B
#   * already include bashio + s6-overlay we don't actually need, but
#     the size cost is < 10 MB compared to a generic alpine:3.19.
#
# Bump these tags only after re-running the full pytest suite locally
# against the matching Python version (currently 3.11 on Alpine 3.19).
# armhf / armv7 / i386 dropped — HA 2025.12 (2025-12-03) drops support
# and the addon-linter rejects them.  Pi 4B is aarch64.
build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base:3.19
  amd64: ghcr.io/home-assistant/amd64-base:3.19

# Image labels — picked up by HA Supervisor's UI badges.
labels:
  org.opencontainers.image.title: "Sleep Classifier"
  org.opencontainers.image.description: "Closed-loop smart-home sleep automation: learns your ideal bedtime + bedroom environment from HA sleep-stage data"
  org.opencontainers.image.source: "https://github.com/LiangyuLu-lly/HA-sleep"
  org.opencontainers.image.licenses: "MIT"

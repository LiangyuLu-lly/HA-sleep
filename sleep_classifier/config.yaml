# Home Assistant add-on manifest for the Sleep Classifier.
#
# v2.0.3 decision: this add-on uses homeassistant_api: true to call HA Core,
# so we MUST wait for Core to be ready before starting.
#
# Reference: https://developers.home-assistant.io/docs/add-ons/configuration/
#
# After publishing this repository to GitHub, the user adds the repo URL in
# Home Assistant -> Settings -> Add-ons -> Add-on Store -> menu -> Repositories.
# The store then offers this add-on as "Sleep Classifier".
name: Sleep Classifier
version: "2.1.9"
slug: sleep_classifier
# v2.0.3: url field for the Supervisor UI "Project homepage" link.
url: "https://github.com/LiangyuLu-lly/HA-sleep"
description: >-
  Closed-loop smart-home sleep automation.  Subscribes to any HA
  sleep-stage sensor (Apple Watch, Mi Band, Fitbit, sleep_as_android, etc.),
  then learns your preferred bedtime and bedroom environment from
  history and writes back temperature / humidity / lighting / fan
  setpoints that match the nights you slept best in.
# Minimum HA Core version we guarantee compatibility with.
homeassistant: "2024.1.0"

# This add-on is built locally (no pre-built image).  Both Pi 4B (aarch64)
# and amd64 are supported.
arch:
  - aarch64
  - amd64

# Auto-start when HA boots; restart if the process dies.
# v2.0.3: services -> application because this add-on depends on HA Core API.
startup: application
init: false

# Talk to the HA Core API via the Supervisor proxy (SUPERVISOR_TOKEN env var).
homeassistant_api: true

# Persistent storage:
#   /share -> public to other add-ons (debug exports)
#   /data  -> private add-on data (preference history JSON lives here)
map:
  - share:rw

# v2.0.3: custom apparmor profile (sleep_classifier/apparmor.txt).
# Supervisor auto-loads it when present, +1 security score.
apparmor: true

# Embedded Web UI for picking entity_ids out of a dropdown.
# aiohttp inside the add-on listens on :8099; HA Supervisor proxies via Ingress.
ingress: true
panel_icon: mdi:bed-clock
panel_title: Sleep Classifier

# User-facing configuration form rendered in the add-on UI.
#
# Resolution order for entity selection (highest wins):
#   1. Slot bindings -- the *_source / *_target / *_targets fields below.
#   2. Keyword scan  -- bilingual substring match against entity_id and
#      friendly_name within the configured area.
#   3. Global fallback -- if no critical sensor matched in step 2, rescan
#      all HA entities (ignoring area filter) and log top candidates.
#
# Tips:
#   * Leave a *_source field empty to use auto-discovery for that role.
#   * Use Developer Tools -> States in HA to find the exact entity_id.
options:
  # ---- General -----------------------------------------------------------
  area: ""                       # leave blank to scan all rooms
  infer_interval: 30
  session_interval: 1800
  dry_run: true                  # ALWAYS start in dry-run for first install
  exploration_rate: 0.1
  min_seconds_between_actions: 120
  deadband_temperature_c: 0.5
  deadband_humidity_pct: 5
  deadband_brightness_pct: 10
  # v1.4.0 -- robustness against real-world timing variability.
  min_stage_dwell_seconds: 60
  wind_down_minutes: 30
  log_level: "info"

  # ---- Slot bindings: sensors -------------------------------------------
  # v1.3.0: ``sleep_stage_source`` REPLACES the old heart-rate /
  # movement / breathing slots.  Mass-market wearables and bedside radars
  # already publish a sleep-stage entity; we read it directly.
  sleep_stage_source: ""         # e.g. sensor.mi_band_8_pro_sleep_stage
  temperature_source: ""         # e.g. sensor.bedroom_temperature
  humidity_source: ""            # e.g. sensor.bedroom_humidity
  illuminance_source: ""         # e.g. sensor.bedroom_illuminance

  # ---- Slot bindings: actionable devices --------------------------------
  light_targets: []              # e.g. [light.bedroom_main, light.bedroom_bedside]
  climate_target: ""             # e.g. climate.bedroom_ac
  humidifier_target: ""          # e.g. humidifier.bedroom_humidifier
  fan_target: ""                 # e.g. fan.bedroom_fan
  switch_targets: []             # general-purpose switches you let us toggle

  # ---- Auto-discovery tunables ------------------------------------------
  controllable_domains:
    - light
    - climate
    - fan
    - humidifier
  explicit_includes: []
  explicit_excludes: []

  # ---- Natural-sleep suite (v1.2.0) -------------------------------------
  # All fields below are OPTIONAL.

  # --- User profile (drives NSF/AAP recommended sleep hours + debt) ---
  birth_year: 0                   # 0 = unknown; otherwise e.g. 1995
  chronotype: "neutral"           # "morning", "evening", or "neutral"

  # --- Smart wake (selects the best wake moment inside a user window) ---
  wake_window_start: ""           # e.g. "07:00"
  wake_window_end: ""             # e.g. "07:30"
  wake_light_targets: []          # lights to ramp; e.g. [light.bedroom_main]

  # --- White-noise / soundscape matcher ---
  whitenoise_target: ""           # e.g. media_player.bedroom_speaker
  whitenoise_volume_scale: 1.0    # global multiplier on per-stage defaults
  whitenoise_track_overrides: []  # e.g. ["pink_noise=media-source://..."]

  # --- White noise volume one-click feedback (v2.0.0) ---
  whitenoise_volume_feedback_entity: ""  # e.g. input_button.sleep_classifier_too_loud

  # --- Subjective feedback (morning rating) ---
  feedback_entity: ""             # e.g. input_number.sleep_rating
  feedback_scale: 5               # 1..scale, usually 5 or 10

  # ---- Apnea / hypopnea trend (v1.7.0) ----------------------------------
  # ALL fields OPT-IN.  Empty disables.  No numeric AHI is ever surfaced.
  apnea_breathing_rate_source: ""      # e.g. sensor.r60abd1_breathing_rate
  apnea_chest_amplitude_source: ""     # e.g. sensor.r60abd1_chest_amplitude
  apnea_consent_entity: "input_boolean.sleep_classifier_apnea_consent"
  apnea_calibration_nights: 7

  # ---- v2.1.0 commercial-readiness additions ----------------------------
  telemetry_enabled: false
  upgrade_notifications_enabled: true

# Schema validates user input in the UI.
schema:
  area: str?
  infer_interval: int(5,300)
  session_interval: int(60,86400)
  dry_run: bool
  exploration_rate: float(0,1)
  min_seconds_between_actions: int(0,3600)
  deadband_temperature_c: float(0,5)
  deadband_humidity_pct: float(0,30)
  deadband_brightness_pct: float(0,50)
  min_stage_dwell_seconds: int(0,900)
  wind_down_minutes: int(0,120)
  log_level: list(debug|info|warning|error)

  # v1.3.0: a single sleep-stage entity replaces hr/movement/breathing.
  sleep_stage_source: 'match(^$|^""$|^(sensor|binary_sensor|input_select)\.[a-zA-Z0-9_]+$)?'
  temperature_source: 'match(^$|^""$|^sensor\.[a-zA-Z0-9_]+$)?'
  humidity_source: 'match(^$|^""$|^sensor\.[a-zA-Z0-9_]+$)?'
  illuminance_source: 'match(^$|^""$|^sensor\.[a-zA-Z0-9_]+$)?'

  light_targets:
    - 'match(^$|^""$|^light\.[a-zA-Z0-9_]+$)'
  climate_target: 'match(^$|^""$|^climate\.[a-zA-Z0-9_]+$)?'
  humidifier_target: 'match(^$|^""$|^humidifier\.[a-zA-Z0-9_]+$)?'
  fan_target: 'match(^$|^""$|^fan\.[a-zA-Z0-9_]+$)?'
  switch_targets:
    - 'match(^$|^""$|^switch\.[a-zA-Z0-9_]+$)'

  controllable_domains:
    - list(light|climate|fan|humidifier|switch|media_player)
  explicit_includes:
    - str
  explicit_excludes:
    - str

  # Natural-sleep suite
  birth_year: "int(0,2100)?"
  chronotype: "list(morning|evening|neutral)?"
  wake_window_start: 'match(^$|^""$|^([01]?\d|2[0-3]):[0-5]\d$)?'
  wake_window_end: 'match(^$|^""$|^([01]?\d|2[0-3]):[0-5]\d$)?'
  wake_light_targets:
    - 'match(^$|^""$|^light\.[a-zA-Z0-9_]+$)'
  whitenoise_target: 'match(^$|^""$|^media_player\.[a-zA-Z0-9_]+$)?'
  whitenoise_volume_scale: "float(0,2)?"
  whitenoise_track_overrides:
    - str
  whitenoise_volume_feedback_entity: 'match(^$|^""$|^input_button\.[a-zA-Z0-9_]+$)?'
  feedback_entity: 'match(^$|^""$|^input_number\.[a-zA-Z0-9_]+$)?'
  feedback_scale: "int(2,10)?"

  # Apnea wiring (v1.7.0) -- all optional.
  apnea_breathing_rate_source: 'match(^$|^""$|^sensor\.[a-zA-Z0-9_]+$)?'
  apnea_chest_amplitude_source: 'match(^$|^""$|^sensor\.[a-zA-Z0-9_]+$)?'
  apnea_consent_entity: 'match(^$|^""$|^input_boolean\.[a-zA-Z0-9_]+$)?'
  apnea_calibration_nights: "int(1,30)?"

  # v2.1.0 commercial-readiness additions
  telemetry_enabled: "bool?"
  upgrade_notifications_enabled: "bool?"

# Home Assistant add-on manifest for the Sleep Classifier.
#
# Reference: https://developers.home-assistant.io/docs/add-ons/configuration/
#
# After publishing this repository to GitHub, the user adds the repo URL in
# Home Assistant → Settings → Add-ons → Add-on Store → ⋮ → Repositories.
# The store then offers this add-on as "Sleep Classifier".
name: Sleep Classifier
version: "1.3.0"
slug: sleep_classifier
description: >-
  Closed-loop smart-home sleep automation.  Subscribes to any HA
  sleep-stage sensor (Apple Watch, Mi Band, Fitbit, sleep_as_android, …),
  then learns your preferred bedtime and bedroom environment from
  history and writes back temperature / humidity / lighting / fan
  setpoints that match the nights you slept best in.

# This add-on is built locally (no pre-built image).  Both Pi 4B (aarch64)
# and amd64 are supported; the others are excluded to keep the build matrix
# small.  Add more if you deploy on different hardware.
arch:
  - aarch64
  - amd64

# Auto-start when HA boots; restart if the process dies.
# (``boot: auto`` is the schema default so the linter wants it omitted.)
startup: services
init: false

# We talk to the HA Core API via the Supervisor proxy.  This grants us a
# session token via the SUPERVISOR_TOKEN env var, so the user never has to
# create a Long-Lived Access Token.
# (``hassio_api``, ``host_network``, ``host_pid`` all default to false and
# the addon-linter complains if we restate the defaults — omitted.)
homeassistant_api: true

# Persistent storage:
#   /share        — public to other add-ons (v1.2 shipped a model file
#                   drop here; kept mapped for ad-hoc debugging exports)
#   /data         — private add-on data (preference history JSON lives here)
map:
  - share:rw

# Embedded Web UI for picking entity_ids out of a dropdown instead of
# typing them by hand into the Configuration form.  The aiohttp server
# inside the add-on listens on :8099; HA Supervisor handles auth +
# reverse-proxy via the Ingress feature, so the user clicks "Open Web
# UI" in the add-on detail page and gets in without an extra login.
# (``ingress_port`` defaults to 8099 — omitted to satisfy the linter.)
ingress: true
panel_icon: mdi:bed-clock
panel_title: Sleep Classifier

# User-facing configuration form rendered in the add-on UI.
#
# Resolution order for entity selection (highest wins):
#   1. Slot bindings  —  the *_source / *_target / *_targets fields below.
#      Filling any of these pins that role to a specific HA entity_id and
#      tells discovery to *skip* keyword scanning for that bucket.
#   2. Keyword scan  —  bilingual (English + Chinese + pinyin) substring
#      match against the entity_id and friendly_name of every entity in
#      the configured area.
#   3. Global fallback  —  if no critical sensor matched in step 2, the
#      add-on will rescan all HA entities (ignoring the area filter) and
#      log the top candidates so you can copy them into the slot fields.
#
# Tips:
#   * Leave a *_source field empty to use auto-discovery for that role.
#   * Use Developer Tools → States in HA to find the exact entity_id of a
#     sensor (e.g. ``sensor.xiaomi_smart_band_9_pro_heart_rate``).
options:
  # ---- General -----------------------------------------------------------
  area: ""                       # leave blank to scan all rooms
  infer_interval: 30
  session_interval: 1800
  dry_run: true                  # ALWAYS start in dry-run for first install
  exploration_rate: 0.1
  min_seconds_between_actions: 120
  deadband_temperature_c: 0.5
  deadband_humidity_pct: 5
  deadband_brightness_pct: 10
  log_level: "info"

  # ---- Slot bindings: sensors -------------------------------------------
  # Pin a single entity_id per slot.  Empty string = auto-discover (for
  # environment sensors) or disabled (for sleep_stage_source, which has
  # no auto-discovery because every device exposes it under a different
  # name).
  #
  # v1.3.0: ``sleep_stage_source`` REPLACES the old heart-rate /
  # movement / breathing slots.  Mass-market wearables (Mi Band, Apple
  # Watch, Garmin, Withings) and bedside radars (R60ABD1, Eight Sleep)
  # already publish a sleep-stage entity into HA — we read that
  # directly instead of running our own CNN-BiLSTM.
  sleep_stage_source: ""         # e.g. sensor.mi_band_8_pro_sleep_stage
  temperature_source: ""         # e.g. sensor.bedroom_temperature
  humidity_source: ""            # e.g. sensor.bedroom_humidity
  illuminance_source: ""         # e.g. sensor.bedroom_illuminance

  # ---- Slot bindings: actionable devices --------------------------------
  # Lists allow multiple targets per role (e.g. main + bedside light).
  light_targets: []              # e.g. [light.bedroom_main, light.bedroom_bedside]
  climate_target: ""             # e.g. climate.bedroom_ac
  humidifier_target: ""          # e.g. humidifier.bedroom_humidifier
  fan_target: ""                 # e.g. fan.bedroom_fan
  switch_targets: []             # general-purpose switches you let us toggle

  # ---- Auto-discovery tunables ------------------------------------------
  # Only environment sensors are auto-discovered now (temperature,
  # humidity, illuminance).  The sleep_stage entity is bound explicitly
  # via ``sleep_stage_source`` above because every vendor names it
  # differently and we want zero ambiguity in the data we learn from.
  controllable_domains:
    - light
    - climate
    - fan
    - humidifier
  explicit_includes: []           # entity_ids to force-include in scan
  explicit_excludes: []           # entity_ids to never touch

  # ---- Natural-sleep suite (v1.2.0) -------------------------------------
  # All fields below are OPTIONAL.  Empty strings / empty lists disable the
  # matching feature without error, so you can turn on one module at a time.

  # --- User profile (drives NSF/AAP recommended sleep hours + debt) ---
  birth_year: 0                   # 0 = unknown; otherwise e.g. 1995
  chronotype: "neutral"           # "morning", "evening", or "neutral"

  # --- Smart wake (selects the best wake moment inside a user window) ---
  # Leave both strings empty to disable smart-wake.  If set, the add-on
  # starts a 30-min dawn light ramp before window_start and fires the
  # "wake" action on the first LIGHT/REM-exit inside the window.
  wake_window_start: ""           # e.g. "07:00"
  wake_window_end: ""             # e.g. "07:30"
  wake_light_targets: []          # lights to ramp; e.g. [light.bedroom_main]

  # --- White-noise / soundscape matcher ---
  # Pick one media_player entity to receive stage-appropriate audio.
  # Leave blank to disable.  Advanced users can override per-stage tracks
  # via whitenoise_overrides (see DOCS.md).
  whitenoise_target: ""           # e.g. media_player.bedroom_speaker
  whitenoise_volume_scale: 1.0    # global multiplier on per-stage defaults
  # Provide one entry per stage you want audio for, in ``key=value`` form.
  # Stage keys: pink_noise / brown_noise / white_noise / rain / wind /
  # ocean / dawn_chorus.  Values can be any HA-recognised media URI:
  #   media-source://media_source/local/sleep/pink.mp3
  #   http://192.168.1.10/sounds/rain.mp3
  #   spotify:track:0VjIjW4GlUZAMYd2vXMi3b
  whitenoise_track_overrides: []  # e.g. ["pink_noise=media-source://..."]

  # --- Subjective feedback (morning "how did you sleep?" rating) ---
  # Point this at an input_number helper you created in HA Settings
  # → Devices & Services → Helpers.  The add-on picks up state changes
  # automatically; you nudge it from Lovelace or a voice routine.
  feedback_entity: ""             # e.g. input_number.sleep_rating
  feedback_scale: 5               # 1..scale, usually 5 or 10

# Schema validates user input in the UI.
#
# The trailing ``?`` in ``match(...)?`` makes a field optional (allows the
# empty string).  Without it, leaving a slot blank would be flagged as a
# validation error and prevent the add-on from starting.
schema:
  area: str?
  infer_interval: int(5,300)
  session_interval: int(60,86400)
  dry_run: bool
  exploration_rate: float(0,1)
  min_seconds_between_actions: int(0,3600)
  deadband_temperature_c: float(0,5)
  deadband_humidity_pct: float(0,30)
  deadband_brightness_pct: float(0,50)
  log_level: list(debug|info|warning|error)

  # NOTE: each entity_id field accepts three forms:
  #   1. an empty string (length 0) — auto-discovery kicks in
  #   2. the literal two-character "" — same as empty (we tolerate this
  #      because users frequently copy the placeholder text verbatim)
  #   3. a real HA entity_id matching the domain regex below
  # v1.3.0: a single sleep-stage entity replaces hr/movement/breathing.
  # We accept sensor.*, binary_sensor.* and input_select.* because some
  # users wrap a script in a helper before piping it in.
  sleep_stage_source: 'match(^$|^""$|^(sensor|binary_sensor|input_select)\.[a-zA-Z0-9_]+$)?'
  temperature_source: 'match(^$|^""$|^sensor\.[a-zA-Z0-9_]+$)?'
  humidity_source: 'match(^$|^""$|^sensor\.[a-zA-Z0-9_]+$)?'
  illuminance_source: 'match(^$|^""$|^sensor\.[a-zA-Z0-9_]+$)?'

  light_targets:
    - 'match(^$|^""$|^light\.[a-zA-Z0-9_]+$)'
  climate_target: 'match(^$|^""$|^climate\.[a-zA-Z0-9_]+$)?'
  humidifier_target: 'match(^$|^""$|^humidifier\.[a-zA-Z0-9_]+$)?'
  fan_target: 'match(^$|^""$|^fan\.[a-zA-Z0-9_]+$)?'
  switch_targets:
    - 'match(^$|^""$|^switch\.[a-zA-Z0-9_]+$)'

  controllable_domains:
    - list(light|climate|fan|humidifier|switch|media_player)
  explicit_includes:
    - str
  explicit_excludes:
    - str

  # Natural-sleep suite ----------------------------------------------------
  # Same empty-or-literal-"" tolerance as the slot bindings above.
  birth_year: "int(0,2100)?"
  chronotype: "list(morning|evening|neutral)?"
  wake_window_start: 'match(^$|^""$|^([01]?\d|2[0-3]):[0-5]\d$)?'
  wake_window_end: 'match(^$|^""$|^([01]?\d|2[0-3]):[0-5]\d$)?'
  wake_light_targets:
    - 'match(^$|^""$|^light\.[a-zA-Z0-9_]+$)'
  whitenoise_target: 'match(^$|^""$|^media_player\.[a-zA-Z0-9_]+$)?'
  whitenoise_volume_scale: "float(0,2)?"
  whitenoise_track_overrides:
    - str
  feedback_entity: 'match(^$|^""$|^input_number\.[a-zA-Z0-9_]+$)?'
  feedback_scale: "int(2,10)?"
